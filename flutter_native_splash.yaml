# Comando para gerar as imagens com o puglin
# fvm dart run flutter_native_splash:create
flutter_native_splash:
  android: true
  ios: true
  android_gravity: center

  # Light mode
  color: "#FFFFFF"
  image: assets/images/launch_screen/logo_colorida_menor.png

  # Dark mode
  color_dark: "#2E2E2E"
  image_dark: assets/images/launch_screen/logo_colorida_menor_dark.png

  android_12:
    # Light mode
    image: assets/images/launch_screen/auroracoop_lauch_android12.png
    icon_background_color: "#FFFFFF"

    # Dark mode
    image_dark: assets/images/launch_screen/auroracoop_lauch_android12_dark.png
    icon_background_color_dark: "#2E2E2E"
